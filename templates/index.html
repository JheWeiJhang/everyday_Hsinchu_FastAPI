<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>新竹每日大小事</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
    body { font-family: 'Noto Sans TC', sans-serif; }
    .card-hover { transition: transform .15s, box-shadow .15s; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.12); }
    .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%; animation: shimmer 1.4s infinite; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .category-btn.active { box-shadow: inset 0 0 0 2px currentColor; font-weight:700; }
    #date-input::-webkit-calendar-picker-indicator { cursor:pointer; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Header -->
<header class="bg-white border-b border-gray-200 sticky top-0 z-30 shadow-sm">
  <div class="max-w-5xl mx-auto px-4 py-3 flex flex-wrap items-center gap-3">
    <div class="flex items-center gap-2 mr-auto">
      <span class="text-2xl">🏙️</span>
      <div>
        <h1 class="text-lg font-bold text-gray-800 leading-tight">新竹每日大小事</h1>
        <p class="text-xs text-gray-400">新聞・美食・景點・活動 一網打盡</p>
      </div>
    </div>
    <!-- Date picker -->
    <div class="flex items-center gap-2 bg-gray-50 border border-gray-200 rounded-lg px-3 py-1.5">
      <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
      </svg>
      <input id="date-input" type="date" class="bg-transparent text-sm text-gray-700 outline-none cursor-pointer" />
    </div>
    <!-- Refresh -->
    <button id="refresh-btn" onclick="loadNews(true)"
      class="flex items-center gap-1.5 bg-indigo-600 hover:bg-indigo-700 text-white text-sm px-3 py-1.5 rounded-lg transition-colors">
      <svg id="refresh-icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
      </svg>
      重新整理
    </button>
  </div>
</header>

<!-- Category tabs -->
<div class="max-w-5xl mx-auto px-4 pt-4 pb-2">
  <div class="flex gap-2 flex-wrap">
    <button class="category-btn active px-4 py-1.5 rounded-full text-sm border-2 border-indigo-500 text-indigo-600 bg-indigo-50 transition-all"
      data-cat="all" onclick="setCategory('all', this)">全部</button>
    <button class="category-btn px-4 py-1.5 rounded-full text-sm border-2 border-blue-400 text-blue-600 bg-blue-50 transition-all"
      data-cat="新聞" onclick="setCategory('新聞', this)">📰 新聞</button>
    <button class="category-btn px-4 py-1.5 rounded-full text-sm border-2 border-orange-400 text-orange-600 bg-orange-50 transition-all"
      data-cat="美食" onclick="setCategory('美食', this)">🍜 美食</button>
    <button class="category-btn px-4 py-1.5 rounded-full text-sm border-2 border-green-400 text-green-600 bg-green-50 transition-all"
      data-cat="景點" onclick="setCategory('景點', this)">🗺️ 景點</button>
    <button class="category-btn px-4 py-1.5 rounded-full text-sm border-2 border-purple-400 text-purple-600 bg-purple-50 transition-all"
      data-cat="娛樂" onclick="setCategory('娛樂', this)">🎉 娛樂</button>
    <button class="category-btn px-4 py-1.5 rounded-full text-sm border-2 border-gray-400 text-gray-600 bg-gray-100 transition-all"
      data-cat="生活" onclick="setCategory('生活', this)">💬 生活</button>
    <button class="category-btn px-4 py-1.5 rounded-full text-sm border-2 border-red-400 text-red-600 bg-red-50 transition-all"
      data-cat="影片" onclick="setCategory('影片', this)">▶️ 影片</button>
  </div>
</div>

<!-- Stats bar -->
<div class="max-w-5xl mx-auto px-4 py-2 flex items-center gap-3 text-xs text-gray-400">
  <span id="stats-text">載入中...</span>
  <span id="cache-badge" class="hidden px-2 py-0.5 bg-yellow-100 text-yellow-700 rounded-full">快取</span>
</div>

<!-- Main content -->
<main class="max-w-5xl mx-auto px-4 pb-12">

  <!-- Skeleton loaders -->
  <div id="skeleton-grid" class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
    <div class="skeleton h-44 rounded-xl"></div>
    <div class="skeleton h-44 rounded-xl"></div>
    <div class="skeleton h-44 rounded-xl"></div>
    <div class="skeleton h-44 rounded-xl hidden sm:block"></div>
    <div class="skeleton h-44 rounded-xl hidden lg:block"></div>
    <div class="skeleton h-44 rounded-xl hidden lg:block"></div>
  </div>

  <!-- Article grid -->
  <div id="article-grid" class="hidden grid gap-4 sm:grid-cols-2 lg:grid-cols-3"></div>

  <!-- Empty state -->
  <div id="empty-state" class="hidden text-center py-20">
    <div class="text-5xl mb-4">🔍</div>
    <p class="text-gray-500 text-lg font-medium">找不到相關內容</p>
    <p class="text-gray-400 text-sm mt-1">換個日期或分類試試看</p>
  </div>

  <!-- Error state -->
  <div id="error-state" class="hidden text-center py-20">
    <div class="text-5xl mb-4">⚠️</div>
    <p class="text-gray-500 text-lg font-medium">載入失敗</p>
    <p id="error-msg" class="text-gray-400 text-sm mt-1"></p>
    <button onclick="loadNews(true)" class="mt-4 px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm">重試</button>
  </div>
</main>

<script>
  const CATEGORY_STYLES = {
    "新聞": "bg-blue-100 text-blue-700",
    "美食": "bg-orange-100 text-orange-700",
    "景點": "bg-green-100 text-green-700",
    "娛樂": "bg-purple-100 text-purple-700",
    "生活": "bg-gray-100 text-gray-600",
    "影片": "bg-red-100 text-red-700",
  };
  const CATEGORY_ICONS = { "新聞":"📰","美食":"🍜","景點":"🗺️","娛樂":"🎉","生活":"💬","影片":"▶️" };
  const SOURCE_COLORS = {
    "Google 新聞": "bg-indigo-50 text-indigo-600",
    "中央社":      "bg-red-50 text-red-600",
    "PTT 新竹版":  "bg-green-50 text-green-700",
    "新竹縣政府":  "bg-sky-50 text-sky-700",
    "新竹市政府":  "bg-sky-100 text-sky-800",
    "新竹縣文化局":"bg-violet-50 text-violet-700",
  };

  let currentCategory = "all";
  let allArticles = [];

  // Init date input
  const dateInput = document.getElementById("date-input");
  const today = new Date().toISOString().split("T")[0];
  dateInput.value = today;
  dateInput.max = today;
  dateInput.addEventListener("change", () => loadNews(false));

  function setCategory(cat, btn) {
    currentCategory = cat;
    document.querySelectorAll(".category-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    renderArticles();
  }

  function getFilteredArticles() {
    if (currentCategory === "all") return allArticles;
    return allArticles.filter(a => a.category === currentCategory);
  }

  function renderArticles() {
    const grid = document.getElementById("article-grid");
    const empty = document.getElementById("empty-state");
    document.getElementById("error-state").classList.add("hidden");
    const filtered = getFilteredArticles();

    if (filtered.length === 0) {
      grid.classList.add("hidden");
      empty.classList.remove("hidden");
      // 影片分類空白時給更具體的說明
      if (currentCategory === "影片") {
        document.getElementById("empty-state").innerHTML =
          `<div class="text-center py-16 text-gray-400">
            <div class="text-5xl mb-4">▶️</div>
            <p class="text-lg font-medium text-gray-500">此日期無 YouTube 影片</p>
            <p class="text-sm mt-2">影片搜尋結果取決於 YouTube 演算法，<br>通常只涵蓋近 3～5 天的內容</p>
          </div>`;
      }
      document.getElementById("stats-text").textContent = "沒有找到相關內容";
      return;
    }

    empty.classList.add("hidden");
    grid.classList.remove("hidden");
    grid.innerHTML = filtered.map(a => cardHTML(a)).join("");

    const total = allArticles.length;
    const shown = filtered.length;
    document.getElementById("stats-text").textContent =
      currentCategory === "all"
        ? `共 ${total} 則內容`
        : `顯示 ${shown} 則（共 ${total} 則）`;
  }

  function cardHTML(a) {
    const catStyle = CATEGORY_STYLES[a.category] || "bg-gray-100 text-gray-600";
    const catIcon = CATEGORY_ICONS[a.category] || "📌";
    const srcStyle = SOURCE_COLORS[a.source]
      || (a.source.startsWith("YouTube") ? "bg-red-50 text-red-600" : "bg-gray-50 text-gray-500");
    const img = a.image
      ? `<img src="${escHtml(a.image)}" class="w-full h-36 object-cover rounded-t-xl" onerror="this.parentElement.remove()" loading="lazy" />`
      : "";
    const summary = a.summary
      ? `<p class="text-xs text-gray-500 mt-1 line-clamp-2">${escHtml(a.summary)}</p>`
      : "";
    return `
      <a href="${escHtml(a.link)}" target="_blank" rel="noopener"
        class="card-hover bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden flex flex-col">
        ${img}
        <div class="p-4 flex flex-col flex-1">
          <div class="flex items-center gap-2 mb-2 flex-wrap">
            <span class="text-xs px-2 py-0.5 rounded-full font-medium ${catStyle}">${catIcon} ${escHtml(a.category)}</span>
            <span class="text-xs px-2 py-0.5 rounded-full ${srcStyle}">${escHtml(a.source)}</span>
          </div>
          <h3 class="text-sm font-semibold text-gray-800 line-clamp-3 leading-snug">${escHtml(a.title)}</h3>
          ${summary}
          <p class="text-xs text-gray-400 mt-auto pt-2">${escHtml(a.published)}</p>
        </div>
      </a>`;
  }

  function escHtml(s) {
    return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function showSkeleton(show) {
    document.getElementById("skeleton-grid").classList.toggle("hidden", !show);
    document.getElementById("article-grid").classList.toggle("hidden", show);
  }

  async function loadNews(force = false) {
    const targetDate = dateInput.value;
    const refreshIcon = document.getElementById("refresh-icon");

    // Show loading
    showSkeleton(true);
    document.getElementById("empty-state").classList.add("hidden");
    document.getElementById("error-state").classList.add("hidden");
    refreshIcon.classList.add("animate-spin");
    document.getElementById("stats-text").textContent = "載入中...";

    try {
      const params = new URLSearchParams({ date: targetDate, force: force ? "1" : "0" });
      let res, lastErr;
      for (let attempt = 0; attempt < 3; attempt++) {
        try {
          res = await fetch(`/api/news?${params}`);
          if (res.ok) break;
          throw new Error(`HTTP ${res.status}`);
        } catch (e) {
          lastErr = e;
          if (attempt < 2) await new Promise(r => setTimeout(r, 1500));
        }
      }
      if (!res || !res.ok) throw lastErr;
      const data = await res.json();

      allArticles = data.articles || [];

      const cacheBadge = document.getElementById("cache-badge");
      if (data.from_cache) {
        cacheBadge.classList.remove("hidden");
      } else {
        cacheBadge.classList.add("hidden");
      }

      showSkeleton(false);
      renderArticles();
    } catch (err) {
      showSkeleton(false);
      document.getElementById("error-state").classList.remove("hidden");
      document.getElementById("error-msg").textContent = err.message;
      document.getElementById("stats-text").textContent = "載入失敗";
    } finally {
      refreshIcon.classList.remove("animate-spin");
    }
  }

  // Initial load
  loadNews(false);

  // ── Heartbeat: keep server alive while page is open ──────────────────────
  function sendHeartbeat() {
    fetch('/api/ping').catch(() => {});
  }
  // Send every 20 seconds so server knows browser is still open
  setInterval(sendHeartbeat, 20000);
  // Also fire immediately on page load
  sendHeartbeat();
</script>
</body>
</html>
